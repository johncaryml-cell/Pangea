backend:
  name: github
  repo: johncaryml-cell/Pangea
  branch: main

media_folder: "img"
public_folder: "img"

collections:
  - name: "contenido_global"
    label: "Gestión de Toda la Web"
    files:
      - file: "site.json"
        name: "site"
        label: "Editar Todo el Sitio"
        fields:
          - label: "0. MENÚ DE NAVEGACIÓN (Barra Superior)"
            name: "navbar"
            widget: "list"
            fields:
              - {label: "ID de la sección (¡No cambiar!)", name: "id", widget: "string"}
              - {label: "Ícono (Emoji)", name: "icon", widget: "string"}
              - {label: "Texto del botón", name: "label", widget: "string"}

          - label: "1. PORTADA E INICIO"
            name: "inicio"
            widget: "object"
            fields:
              - {label: "Título Principal", name: "titulo_principal", widget: "string"}
              - {label: "Subtítulo", name: "subtitulo", widget: "string"}
          
          - label: "2. CAPITAL DEL CLAN"
            name: "capital"
            widget: "object"
            fields:
              - {label: "Precio Capital", name: "precio", widget: "string"}
              - {label: "Descripción", name: "desc", widget: "text"}
              
          - label: "3. LIGA LEGENDARIA"
            name: "liga"
            widget: "object"
            fields:
              - {label: "Precio Liga", name: "precio", widget: "string"}
              - {label: "Descripción", name: "desc", widget: "text"}

          - label: "4. MUROS"
            name: "muros"
            widget: "object"
            fields:
              - {label: "Precio Muros", name: "precio", widget: "string"}
              - {label: "Descripción", name: "desc", widget: "text"}

          - label: "5. BASES VIP (Listado)"
            name: "bases_vip"
            widget: "list"
            fields:
              - {label: "ID", name: "id", widget: "string"}
              - {label: "Tipo (Escribir 'vip')", name: "type", widget: "string"}
              - {label: "Nombre", name: "name", widget: "string"}
              - {label: "Precio Numérico (Para PayPal)", name: "price", widget: "number"}
              - {label: "Etiqueta de Precio (Visual)", name: "priceLabel", widget: "string"}
              - {label: "Imagen", name: "img", widget: "image"}
              - {label: "Descripción", name: "desc", widget: "text"}
              - {label: "Ícono", name: "icon", widget: "string"}

          - label: "6. TÉRMINOS Y CONDICIONES"
            name: "terminos"
            widget: "object"
            fields:
              - {label: "Título de Términos", name: "titulo", widget: "string"}
              - {label: "Contenido de Términos", name: "contenido", widget: "markdown"}
