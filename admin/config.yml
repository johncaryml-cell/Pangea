backend:
  name: github
  repo: johncaryml-cell/Pangea
  branch: main

media_folder: "img"
public_folder: "img"

collections:
  - name: "contenido_global"
    label: "Gestión de Toda la Web"
    files:
      - file: "site.json"
        name: "site"
        label: "Editar Todo el Sitio"
        fields:
          - label: "1. PORTADA E INICIO"
            name: "inicio"
            widget: "object"
            fields:
              - {label: "Título Principal", name: "titulo_principal", widget: "string"}
              - {label: "Subtítulo", name: "subtitulo", widget: "string"}
          
          - label: "2. BASES VIP"
            name: "bases_vip"
            widget: "list"
            fields:
              - {label: "ID", name: "id", widget: "string"}
              - {label: "Tipo", name: "type", widget: "string"}
              - {label: "Nombre", name: "name", widget: "string"}
              - {label: "Precio (Número)", name: "price", widget: "number"}
              - {label: "Etiqueta de Precio", name: "priceLabel", widget: "string"}
              - {label: "Imagen", name: "img", widget: "image"}
              - {label: "Descripción", name: "desc", widget: "text"}
              - {label: "Ícono", name: "icon", widget: "string"}

          - label: "3. SERVICIOS EXTRA (Juegos de Clan y Guerras)"
            name: "servicios_extra"
            widget: "object"
            fields:
              - {label: "Precio Juegos de Clan", name: "juegos_clan_precio", widget: "string"}
              - {label: "Descripción Juegos de Clan", name: "juegos_clan_desc", widget: "text"}
              - {label: "Precio Guerras", name: "guerras_precio", widget: "string"}
              - {label: "Descripción Guerras", name: "guerras_desc", widget: "text"}

          - label: "4. TÉRMINOS Y CONDICIONES"
            name: "terminos"
            widget: "object"
            fields:
              - {label: "Título de Términos", name: "titulo", widget: "string"}
              - {label: "Contenido de Términos", name: "contenido", widget: "markdown"}
